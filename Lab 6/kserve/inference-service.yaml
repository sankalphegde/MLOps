apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: iris-classifier-sankalp
  namespace: default
  labels:
    app: iris-classifier-sankalp
    model-version: "1.0.0"
    owner: sankalp-hegde
  annotations:
    # Autoscaling: scale to 0 when idle, max 3 replicas under load
    autoscaling.knative.dev/minScale: "1"
    autoscaling.knative.dev/maxScale: "3"
    autoscaling.knative.dev/target: "10"       # scale up when >10 concurrent requests
    autoscaling.knative.dev/metric: "concurrency"
spec:
  predictor:
    sklearn:
      storageUri: "pvc://iris-model-pvc/model"   # path to model.joblib on PVC
      # ── Resource requests and limits ────────────────────────────────────────
      # Keeps the pod lightweight; increase for larger models
      resources:
        requests:
          memory: "128Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      # ── Runtime configuration ────────────────────────────────────────────────
      runtimeVersion: "1.3.0"                   # sklearn version pinned
